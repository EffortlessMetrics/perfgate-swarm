name: "perfgate-action"
description: "Zero-config performance gating with perfgate check"
author: "Effortless Metrics"

branding:
  icon: "activity"
  color: "blue"

inputs:
  config:
    description: "Path to perfgate config file"
    required: false
    default: "perfgate.toml"
  bench:
    description: "Bench name to run when all=false"
    required: false
    default: ""
  all:
    description: "Run all benches in config"
    required: false
    default: "true"
  out_dir:
    description: "Artifact output directory"
    required: false
    default: "artifacts/perfgate"
  fail_on_warn:
    description: "Treat warn verdicts as failures"
    required: false
    default: "false"
  require_baseline:
    description: "Fail when no baseline is found"
    required: false
    default: "false"
  host_mismatch:
    description: "Host mismatch policy: warn, error, or ignore"
    required: false
    default: "warn"
  mode:
    description: "Check output mode: standard or cockpit"
    required: false
    default: "standard"
  md_template:
    description: "Optional Handlebars template path for markdown output"
    required: false
    default: ""
  output_github:
    description: "Write verdict/count outputs to GITHUB_OUTPUT"
    required: false
    default: "true"
  upload_artifact:
    description: "Upload generated artifacts via actions/upload-artifact"
    required: false
    default: "true"
  artifact_name:
    description: "Artifact name used when upload_artifact=true"
    required: false
    default: "perfgate-artifacts"
  version:
    description: "Optional perfgate crate version from crates.io (e.g. 0.3.0); if empty, builds from this action source"
    required: false
    default: ""
  comment:
    description: "Post or update a PR comment with perfgate results (requires GITHUB_TOKEN)"
    required: false
    default: "false"
  github_token:
    description: "GitHub token for posting PR comments (defaults to github.token)"
    required: false
    default: ""

outputs:
  verdict:
    description: "Overall verdict (pass|warn|fail|skip); requires output_github=true"
    value: ${{ steps.run_check.outputs.verdict }}
  pass_count:
    description: "Count of passing checks; requires output_github=true"
    value: ${{ steps.run_check.outputs.pass_count }}
  warn_count:
    description: "Count of warning checks; requires output_github=true"
    value: ${{ steps.run_check.outputs.warn_count }}
  fail_count:
    description: "Count of failing checks; requires output_github=true"
    value: ${{ steps.run_check.outputs.fail_count }}
  bench_count:
    description: "Count of benches evaluated; requires output_github=true"
    value: ${{ steps.run_check.outputs.bench_count }}
  exit_code:
    description: "perfgate process exit code (0=pass, 1=error, 2=fail, 3=warn-as-fail); always available"
    value: ${{ steps.run_check.outputs.exit_code }}

runs:
  using: "composite"
  steps:
    - name: Detect platform target
      id: detect
      shell: bash
      run: |
        set -euo pipefail
        case "$RUNNER_OS-$RUNNER_ARCH" in
          Linux-X64)    target="x86_64-unknown-linux-gnu" ; ext="tar.gz" ;;
          Linux-ARM64)  target="aarch64-unknown-linux-gnu" ; ext="tar.gz" ;;
          macOS-X64)    target="x86_64-apple-darwin"       ; ext="tar.gz" ;;
          macOS-ARM64)  target="aarch64-apple-darwin"      ; ext="tar.gz" ;;
          Windows-X64)  target="x86_64-pc-windows-msvc"    ; ext="zip"    ;;
          *)            target="" ; ext="" ;;
        esac
        echo "target=${target}" >> "${GITHUB_OUTPUT}"
        echo "ext=${ext}" >> "${GITHUB_OUTPUT}"

    - name: Install perfgate (pre-built binary)
      id: install_binary
      if: steps.detect.outputs.target != '' && inputs.version != ''
      shell: bash
      run: |
        set -euo pipefail
        version="${{ inputs.version }}"
        target="${{ steps.detect.outputs.target }}"
        ext="${{ steps.detect.outputs.ext }}"
        url="https://github.com/EffortlessMetrics/perfgate/releases/download/v${version}/perfgate-${target}.${ext}"

        echo "Downloading perfgate v${version} for ${target}..."
        echo "URL: ${url}"

        tmpdir="$(mktemp -d)"
        ok=false
        if curl -fsSL "${url}" -o "${tmpdir}/archive.${ext}"; then
          if [[ "${ext}" == "tar.gz" ]]; then
            tar xzf "${tmpdir}/archive.${ext}" -C "${tmpdir}" && ok=true
          else
            unzip -o "${tmpdir}/archive.${ext}" -d "${tmpdir}" && ok=true
          fi
        fi

        if [[ "${ok}" == "true" ]]; then
          # Install to a directory on PATH
          install_dir="${HOME}/.perfgate/bin"
          mkdir -p "${install_dir}"
          if [[ "${ext}" == "tar.gz" ]]; then
            chmod +x "${tmpdir}/perfgate"
            cp "${tmpdir}/perfgate" "${install_dir}/"
          else
            cp "${tmpdir}/perfgate.exe" "${install_dir}/"
          fi
          echo "${install_dir}" >> "${GITHUB_PATH}"

          echo "installed=true" >> "${GITHUB_OUTPUT}"
          echo "Installed perfgate v${version} from pre-built binary"
        else
          echo "installed=false" >> "${GITHUB_OUTPUT}"
          echo "::warning::Pre-built binary not available for ${target}, will fall back to cargo install"
        fi
        rm -rf "${tmpdir}"

    - name: Install Rust toolchain
      if: steps.install_binary.outputs.installed != 'true'
      uses: dtolnay/rust-toolchain@1.93.0

    - name: Install perfgate (cargo install fallback)
      if: steps.install_binary.outputs.installed != 'true'
      shell: bash
      run: |
        set -euo pipefail
        if [[ -n "${{ inputs.version }}" ]]; then
          cargo install perfgate --locked --force --version "${{ inputs.version }}"
        else
          cargo install --path "${GITHUB_ACTION_PATH}/crates/perfgate-cli" --locked --force
        fi

    - id: run_check
      name: Run perfgate check
      shell: bash
      run: |
        set -euo pipefail

        args=(
          check
          --config "${{ inputs.config }}"
          --out-dir "${{ inputs.out_dir }}"
          --host-mismatch "${{ inputs.host_mismatch }}"
          --mode "${{ inputs.mode }}"
        )

        if [[ "${{ inputs.all }}" == "true" ]]; then
          args+=(--all)
        else
          if [[ -z "${{ inputs.bench }}" ]]; then
            echo "input 'bench' is required when all=false" >&2
            exit 1
          fi
          args+=(--bench "${{ inputs.bench }}")
        fi

        if [[ "${{ inputs.fail_on_warn }}" == "true" ]]; then
          args+=(--fail-on-warn)
        fi

        if [[ "${{ inputs.require_baseline }}" == "true" ]]; then
          args+=(--require-baseline)
        fi

        if [[ -n "${{ inputs.md_template }}" ]]; then
          args+=(--md-template "${{ inputs.md_template }}")
        fi

        if [[ "${{ inputs.output_github }}" == "true" ]]; then
          args+=(--output-github)
        fi

        set +e
        perfgate "${args[@]}"
        status=$?
        set -e

        echo "exit_code=${status}" >> "${GITHUB_OUTPUT}"

        exit "${status}"

    - name: Post PR comment
      if: always() && inputs.comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token || github.token }}
      run: |
        set -euo pipefail

        # Find a compare or report receipt to comment on.
        # In standard mode, report.json is a perfgate.report.v1.
        # In cockpit mode, report.json is a sensor.report.v1 (not
        # parseable as --report), so we look for extras/ receipts first.
        out="${{ inputs.out_dir }}"
        pr_num="${{ github.event.pull_request.number }}"
        posted=false

        # 1. Cockpit single-bench extras
        if [[ "${posted}" == "false" && -f "${out}/extras/perfgate.report.v1.json" ]]; then
          perfgate comment --report "${out}/extras/perfgate.report.v1.json" --pr "${pr_num}" || true
          posted=true
        fi

        # 2. Standard mode report.json (perfgate.report.v1)
        if [[ "${posted}" == "false" && -f "${out}/report.json" && "${{ inputs.mode }}" != "cockpit" ]]; then
          perfgate comment --report "${out}/report.json" --pr "${pr_num}" || true
          posted=true
        fi

        # 3. Standard mode compare.json
        if [[ "${posted}" == "false" && -f "${out}/compare.json" ]]; then
          perfgate comment --compare "${out}/compare.json" --pr "${pr_num}" || true
          posted=true
        fi

        if [[ "${posted}" == "false" ]]; then
          echo "No compare or report receipt found; skipping PR comment." >&2
        fi

    - name: Upload perfgate artifacts
      if: always() && inputs.upload_artifact == 'true'
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.artifact_name }}-${{ github.run_id }}-${{ github.run_attempt }}
        path: ${{ inputs.out_dir }}
        if-no-files-found: warn
