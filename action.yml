name: "perfgate-action"
description: "Zero-config performance gating with perfgate check"
author: "Effortless Metrics"

branding:
  icon: "activity"
  color: "blue"

inputs:
  config:
    description: "Path to perfgate config file"
    required: false
    default: "perfgate.toml"
  bench:
    description: "Bench name to run when all=false"
    required: false
    default: ""
  all:
    description: "Run all benches in config"
    required: false
    default: "true"
  out_dir:
    description: "Artifact output directory; defaults to [defaults].out_dir or artifacts/perfgate"
    required: false
    default: ""
  fail_on_warn:
    description: "Treat warn verdicts as failures"
    required: false
    default: "false"
  require_baseline:
    description: "Fail when no baseline is found"
    required: false
    default: "false"
  host_mismatch:
    description: "Host mismatch policy: warn, error, or ignore"
    required: false
    default: "warn"
  mode:
    description: "Check output mode: standard or cockpit"
    required: false
    default: "standard"
  md_template:
    description: "Optional Handlebars template path for markdown output"
    required: false
    default: ""
  output_github:
    description: "Write verdict/count outputs to GITHUB_OUTPUT"
    required: false
    default: "true"
  upload_artifact:
    description: "Upload generated artifacts via actions/upload-artifact"
    required: false
    default: "true"
  artifact_name:
    description: "Artifact name used when upload_artifact=true"
    required: false
    default: "perfgate-artifacts"
  version:
    description: "Optional perfgate-cli crate version from crates.io (e.g. 0.17.0); if empty, builds from this action source"
    required: false
    default: ""
  comment:
    description: "Post or update a PR comment with perfgate results (requires GITHUB_TOKEN)"
    required: false
    default: "false"
  decision:
    description: "Run perfgate decision evaluate after check and publish scenario/tradeoff/decision artifacts plus the decision index"
    required: false
    default: "false"
  review_required:
    description: "How decision=true handles review-required decisions: warn, fail, or pass"
    required: false
    default: "warn"
  github_token:
    description: "GitHub token for posting PR comments (defaults to github.token)"
    required: false
    default: ""

outputs:
  verdict:
    description: "Overall verdict (pass|warn|fail|skip); requires output_github=true"
    value: ${{ steps.run_check.outputs.verdict }}
  pass_count:
    description: "Count of passing checks; requires output_github=true"
    value: ${{ steps.run_check.outputs.pass_count }}
  warn_count:
    description: "Count of warning checks; requires output_github=true"
    value: ${{ steps.run_check.outputs.warn_count }}
  fail_count:
    description: "Count of failing checks; requires output_github=true"
    value: ${{ steps.run_check.outputs.fail_count }}
  bench_count:
    description: "Count of benches evaluated; requires output_github=true"
    value: ${{ steps.run_check.outputs.bench_count }}
  exit_code:
    description: "perfgate process exit code (0=pass, 1=error, 2=fail, 3=warn-as-fail); always available"
    value: ${{ steps.run_check.outputs.exit_code }}
  decision_exit_code:
    description: "perfgate decision evaluate exit code when decision=true"
    value: ${{ steps.run_decision.outputs.exit_code }}
  review_required:
    description: "Whether decision=true produced a review-required decision"
    value: ${{ steps.handle_review_required.outputs.review_required }}
  review_required_reason:
    description: "Review-required reasons reported by the decision receipt"
    value: ${{ steps.handle_review_required.outputs.review_required_reason }}

runs:
  using: "composite"
  steps:
    - name: Detect platform target
      id: detect
      shell: bash
      run: |
        set -euo pipefail
        case "$RUNNER_OS-$RUNNER_ARCH" in
          Linux-X64)    target="x86_64-unknown-linux-gnu" ; ext="tar.gz" ;;
          Linux-ARM64)  target="aarch64-unknown-linux-gnu" ; ext="tar.gz" ;;
          macOS-X64)    target="x86_64-apple-darwin"       ; ext="tar.gz" ;;
          macOS-ARM64)  target="aarch64-apple-darwin"      ; ext="tar.gz" ;;
          Windows-X64)  target="x86_64-pc-windows-msvc"    ; ext="zip"    ;;
          *)            target="" ; ext="" ;;
        esac
        echo "target=${target}" >> "${GITHUB_OUTPUT}"
        echo "ext=${ext}" >> "${GITHUB_OUTPUT}"

    - name: Install perfgate (pre-built binary)
      id: install_binary
      if: steps.detect.outputs.target != '' && inputs.version != ''
      shell: bash
      run: |
        set -euo pipefail
        version="${{ inputs.version }}"
        target="${{ steps.detect.outputs.target }}"
        ext="${{ steps.detect.outputs.ext }}"
        url="https://github.com/EffortlessMetrics/perfgate/releases/download/v${version}/perfgate-${target}.${ext}"

        echo "Downloading perfgate v${version} for ${target}..."
        echo "URL: ${url}"

        tmpdir="$(mktemp -d)"
        ok=false
        if curl -fsSL "${url}" -o "${tmpdir}/archive.${ext}"; then
          if [[ "${ext}" == "tar.gz" ]]; then
            tar xzf "${tmpdir}/archive.${ext}" -C "${tmpdir}" && ok=true
          else
            unzip -o "${tmpdir}/archive.${ext}" -d "${tmpdir}" && ok=true
          fi
        fi

        if [[ "${ok}" == "true" ]]; then
          # Install to a directory on PATH
          install_dir="${HOME}/.perfgate/bin"
          mkdir -p "${install_dir}"
          if [[ "${ext}" == "tar.gz" ]]; then
            chmod +x "${tmpdir}/perfgate"
            cp "${tmpdir}/perfgate" "${install_dir}/"
          else
            cp "${tmpdir}/perfgate.exe" "${install_dir}/"
          fi
          echo "${install_dir}" >> "${GITHUB_PATH}"

          echo "installed=true" >> "${GITHUB_OUTPUT}"
          echo "Installed perfgate v${version} from pre-built binary"
        else
          echo "installed=false" >> "${GITHUB_OUTPUT}"
          echo "::warning::Pre-built binary not available for ${target}, will fall back to cargo install"
        fi
        rm -rf "${tmpdir}"

    - name: Install Rust toolchain
      if: steps.install_binary.outputs.installed != 'true'
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.95.0

    - name: Install perfgate (cargo install fallback)
      if: steps.install_binary.outputs.installed != 'true'
      shell: bash
      run: |
        set -euo pipefail
        if [[ -n "${{ inputs.version }}" ]]; then
          cargo install perfgate-cli --locked --force --version "${{ inputs.version }}"
        else
          cargo install --path "${GITHUB_ACTION_PATH}/crates/perfgate-cli" --locked --force
        fi

    - name: Verify perfgate installation
      shell: bash
      run: |
        set -euo pipefail
        perfgate --version
        perfgate doctor --help

    - id: resolve_out_dir
      name: Resolve artifact directory
      shell: bash
      run: |
        set -euo pipefail

        default_out_dir="artifacts/perfgate"
        if [[ -n "${{ inputs.out_dir }}" ]]; then
          out_dir="${{ inputs.out_dir }}"
        else
          if command -v python3 >/dev/null 2>&1; then
            py=python3
          elif command -v python >/dev/null 2>&1; then
            py=python
          else
            py=""
          fi

          if [[ -n "${py}" ]]; then
            out_dir="$("${py}" - "${{ inputs.config }}" "${default_out_dir}" <<'PY'
        import json
        import pathlib
        import sys

        config_path = pathlib.Path(sys.argv[1])
        default = sys.argv[2]

        def fallback_toml_out_dir(text):
            in_defaults = False
            for raw_line in text.splitlines():
                line = raw_line.split("#", 1)[0].strip()
                if not line:
                    continue
                if line.startswith("[") and line.endswith("]"):
                    in_defaults = line == "[defaults]"
                    continue
                if in_defaults:
                    key, sep, value = line.partition("=")
                    if sep and key.strip() == "out_dir":
                        value = value.strip()
                        if len(value) >= 2 and value[0] == value[-1] and value[0] in ("'", '"'):
                            return value[1:-1]
                        return value
            return None

        try:
            text = config_path.read_text(encoding="utf-8")
            if config_path.suffix.lower() == ".json":
                data = json.loads(text)
                value = (data.get("defaults") or {}).get("out_dir")
            else:
                try:
                    import tomllib
                except ModuleNotFoundError:
                    value = fallback_toml_out_dir(text)
                else:
                    data = tomllib.loads(text)
                    value = (data.get("defaults") or {}).get("out_dir")
            print(value or default)
        except Exception:
            print(default)
        PY
        )"
          else
            out_dir="${default_out_dir}"
          fi
        fi

        echo "out_dir=${out_dir}" >> "${GITHUB_OUTPUT}"
        echo "Using perfgate artifact directory: ${out_dir}"

    - id: run_check
      name: Run perfgate check
      shell: bash
      run: |
        set -euo pipefail

        args=(
          check
          --config "${{ inputs.config }}"
          --host-mismatch "${{ inputs.host_mismatch }}"
          --mode "${{ inputs.mode }}"
        )

        if [[ -n "${{ inputs.out_dir }}" ]]; then
          args+=(--out-dir "${{ inputs.out_dir }}")
        fi

        if [[ "${{ inputs.all }}" == "true" ]]; then
          args+=(--all)
        else
          if [[ -z "${{ inputs.bench }}" ]]; then
            echo "input 'bench' is required when all=false" >&2
            exit 1
          fi
          args+=(--bench "${{ inputs.bench }}")
        fi

        if [[ "${{ inputs.fail_on_warn }}" == "true" ]]; then
          args+=(--fail-on-warn)
        fi

        if [[ "${{ inputs.require_baseline }}" == "true" ]]; then
          args+=(--require-baseline)
        fi

        if [[ -n "${{ inputs.md_template }}" ]]; then
          args+=(--md-template "${{ inputs.md_template }}")
        fi

        if [[ "${{ inputs.output_github }}" == "true" ]]; then
          args+=(--output-github)
        fi

        set +e
        perfgate "${args[@]}"
        status=$?
        set -e

        echo "exit_code=${status}" >> "${GITHUB_OUTPUT}"

        if [[ "${{ inputs.decision }}" == "true" && "${status}" == "2" ]]; then
          echo "policy_failure_deferred=true" >> "${GITHUB_OUTPUT}"
          echo "perfgate check reported a policy failure; deferring final verdict to decision evaluate."
          exit 0
        fi

        echo "policy_failure_deferred=false" >> "${GITHUB_OUTPUT}"
        exit "${status}"

    - id: run_decision
      name: Run perfgate decision
      if: always() && inputs.decision == 'true' && (steps.run_check.outputs.exit_code == '0' || steps.run_check.outputs.exit_code == '2')
      shell: bash
      run: |
        set -euo pipefail

        args=(decision evaluate --config "${{ inputs.config }}")

        if [[ -n "${{ inputs.out_dir }}" ]]; then
          args+=(--out-dir "${{ inputs.out_dir }}")
        fi

        set +e
        perfgate "${args[@]}"
        status=$?
        set -e

        echo "exit_code=${status}" >> "${GITHUB_OUTPUT}"

        exit "${status}"

    - name: Append perfgate decision summary
      if: always() && inputs.decision == 'true'
      shell: bash
      run: |
        set -euo pipefail

        out="${{ steps.resolve_out_dir.outputs.out_dir }}"
        if [[ -f "${out}/decision.md" && -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
          {
            echo "### perfgate decision"
            echo
            cat "${out}/decision.md"
          } >> "${GITHUB_STEP_SUMMARY}"
        fi

    - id: handle_review_required
      name: Handle review-required decision
      if: always() && inputs.decision == 'true' && steps.run_decision.outputs.exit_code == '0'
      shell: bash
      run: |
        set -euo pipefail

        policy="${{ inputs.review_required }}"
        case "${policy}" in
          pass|warn|fail) ;;
          *)
            echo "::error::input 'review_required' must be pass, warn, or fail"
            echo "review_required=false" >> "${GITHUB_OUTPUT}"
            echo "review_required_reason=invalid review_required policy" >> "${GITHUB_OUTPUT}"
            echo "exit_code=1" >> "${GITHUB_OUTPUT}"
            exit 1
            ;;
        esac

        out="${{ steps.resolve_out_dir.outputs.out_dir }}"
        tradeoff=""
        for candidate in "${out}/tradeoff.json" "${out}/perfgate.tradeoff.v1.json" "${out}/extras/perfgate.tradeoff.v1.json"; do
          if [[ -f "${candidate}" ]]; then
            tradeoff="${candidate}"
            break
          fi
        done

        if [[ -z "${tradeoff}" ]]; then
          echo "review_required=false" >> "${GITHUB_OUTPUT}"
          echo "review_required_reason=" >> "${GITHUB_OUTPUT}"
          echo "exit_code=0" >> "${GITHUB_OUTPUT}"
          exit 0
        fi

        if command -v python3 >/dev/null 2>&1; then
          py=python3
        elif command -v python >/dev/null 2>&1; then
          py=python
        else
          echo "::warning::Python is not available; cannot inspect decision review_required state"
          echo "review_required=false" >> "${GITHUB_OUTPUT}"
          echo "review_required_reason=unable to inspect decision receipt" >> "${GITHUB_OUTPUT}"
          echo "exit_code=0" >> "${GITHUB_OUTPUT}"
          exit 0
        fi

        review_required="$("${py}" -c 'import json, sys; data = json.load(open(sys.argv[1], encoding="utf-8")); decision = data.get("decision") or {}; print("true" if decision.get("review_required") else "false")' "${tradeoff}")"
        review_reason="$("${py}" -c 'import json, sys; data = json.load(open(sys.argv[1], encoding="utf-8")); decision = data.get("decision") or {}; reasons = decision.get("review_reasons") or []; print("; ".join(str(reason).replace("\n", " ").replace("\r", " ") for reason in reasons) if reasons else "decision receipt requires review")' "${tradeoff}")"

        echo "review_required=${review_required}" >> "${GITHUB_OUTPUT}"
        echo "review_required_reason=${review_reason}" >> "${GITHUB_OUTPUT}"

        if [[ "${review_required}" != "true" ]]; then
          echo "exit_code=0" >> "${GITHUB_OUTPUT}"
          exit 0
        fi

        case "${policy}" in
          pass)
            echo "perfgate decision requires review, but review_required=pass leaves the action successful: ${review_reason}"
            echo "exit_code=0" >> "${GITHUB_OUTPUT}"
            ;;
          warn)
            echo "::warning::perfgate decision requires review: ${review_reason}"
            echo "exit_code=0" >> "${GITHUB_OUTPUT}"
            ;;
          fail)
            echo "::error::perfgate decision requires review: ${review_reason}"
            echo "exit_code=2" >> "${GITHUB_OUTPUT}"
            exit 2
            ;;
        esac

    - name: Append perfgate policy posture summary
      if: always() && steps.run_check.outputs.exit_code != ''
      shell: bash
      run: |
        set -euo pipefail

        if [[ -z "${GITHUB_STEP_SUMMARY:-}" ]]; then
          exit 0
        fi

        out="${{ steps.resolve_out_dir.outputs.out_dir }}"
        exit_code="${{ steps.run_check.outputs.exit_code }}"
        verdict="${{ steps.run_check.outputs.verdict }}"
        review_required="${{ steps.handle_review_required.outputs.review_required }}"
        review_reason="${{ steps.handle_review_required.outputs.review_required_reason }}"

        policy_args=(policy doctor --config "${{ inputs.config }}")
        if [[ -n "${out}" ]]; then
          policy_args+=(--out-dir "${out}")
        fi
        if [[ "${{ inputs.all }}" != "true" && -n "${{ inputs.bench }}" ]]; then
          policy_args+=(--bench "${{ inputs.bench }}")
        fi

        review_packet_args=()
        if [[ "${{ inputs.all }}" != "true" && -n "${{ inputs.bench }}" ]]; then
          review_packet_args=(policy review-packet --config "${{ inputs.config }}" --bench "${{ inputs.bench }}")
          if [[ -n "${out}" ]]; then
            review_packet_args+=(--out-dir "${out}")
          fi
        fi

        format_command() {
          local formatted=""
          local quoted=""
          local arg

          for arg in "$@"; do
            if [[ -n "${formatted}" ]]; then
              formatted+=" "
            fi
            printf -v quoted "%q" "${arg}"
            formatted+="${quoted}"
          done

          printf "%s" "${formatted}"
        }

        policy_output="$(mktemp)"
        policy_status="available"
        if ! perfgate "${policy_args[@]}" > "${policy_output}" 2>&1; then
          policy_status="unavailable"
        fi

        policy_line="$(format_command perfgate "${policy_args[@]}")"
        review_packet_line=""
        if [[ "${#review_packet_args[@]}" -gt 0 ]]; then
          review_packet_line="$(format_command perfgate "${review_packet_args[@]}")"
        fi

        {
          echo "### perfgate policy posture"
          echo
          echo "Blocking behavior: this action preserves existing perfgate exit-code behavior; maturity guidance is advisory unless your config already makes it blocking."
          if [[ "${{ inputs.require_baseline }}" == "true" ]]; then
            echo "Blocking gate: required-baseline mode is enabled."
          else
            echo "Advisory signal: missing baselines remain setup guidance unless this workflow enables required-baseline mode."
          fi
          if [[ -n "${verdict}" ]]; then
            echo "Gate verdict: \`${verdict}\` (check exit code \`${exit_code}\`)."
          else
            echo "Gate verdict: unavailable (check exit code \`${exit_code}\`)."
          fi
          if [[ "${review_required}" == "true" ]]; then
            echo "Policy review required: ${review_reason}"
          fi
          echo
          echo "Policy doctor command:"
          echo
          printf '%s\n' '```bash'
          echo "${policy_line}"
          printf '%s\n' '```'
          if [[ -n "${review_packet_line}" ]]; then
            echo
            echo "Review packet command:"
            echo
            printf '%s\n' '```bash'
            echo "${review_packet_line}"
            printf '%s\n' '```'
          fi
          echo
          echo "Policy doctor output (${policy_status}):"
          echo
          printf '%s\n' '```text'
          cat "${policy_output}"
          printf '%s\n' '```'
          echo
          echo "Do not: make advisory maturity output blocking, loosen thresholds, promote baselines, or require server ledger mode from this summary alone."
        } >> "${GITHUB_STEP_SUMMARY}"

        rm -f "${policy_output}"

    - name: Print perfgate failure summary
      if: always() && ((steps.run_check.outputs.exit_code != '0' && steps.run_check.outputs.policy_failure_deferred != 'true') || (inputs.decision == 'true' && steps.run_decision.outputs.exit_code != '' && steps.run_decision.outputs.exit_code != '0') || (inputs.decision == 'true' && steps.handle_review_required.outputs.exit_code != '' && steps.handle_review_required.outputs.exit_code != '0'))
      shell: bash
      run: |
        set -euo pipefail

        out="${{ steps.resolve_out_dir.outputs.out_dir }}"
        exit_code="${{ steps.run_check.outputs.exit_code }}"
        decision_exit_code="${{ steps.run_decision.outputs.exit_code }}"
        review_exit_code="${{ steps.handle_review_required.outputs.exit_code }}"
        verdict="${{ steps.run_check.outputs.verdict }}"
        pass_count="${{ steps.run_check.outputs.pass_count }}"
        warn_count="${{ steps.run_check.outputs.warn_count }}"
        fail_count="${{ steps.run_check.outputs.fail_count }}"
        bench_count="${{ steps.run_check.outputs.bench_count }}"
        review_required="${{ steps.handle_review_required.outputs.review_required }}"
        review_reason="${{ steps.handle_review_required.outputs.review_required_reason }}"
        artifact_name="${{ inputs.artifact_name }}-${{ github.run_id }}-${{ github.run_attempt }}"
        exit_source="check"
        if [[ "${{ inputs.decision }}" == "true" && -n "${decision_exit_code}" && "${decision_exit_code}" != "0" ]]; then
          exit_code="${decision_exit_code}"
          exit_source="decision"
        elif [[ "${{ inputs.decision }}" == "true" && -n "${review_exit_code}" && "${review_exit_code}" != "0" ]]; then
          exit_code="${review_exit_code}"
          exit_source="decision review"
        fi
        if [[ -z "${exit_code}" ]]; then
          exit_code="unknown"
        fi

        repro=(perfgate check --config "${{ inputs.config }}")

        if [[ "${{ inputs.all }}" == "true" ]]; then
          repro+=(--all)
        else
          repro+=(--bench "${{ inputs.bench }}")
        fi

        if [[ -n "${{ inputs.out_dir }}" ]]; then
          repro+=(--out-dir "${{ inputs.out_dir }}")
        fi

        if [[ "${{ inputs.host_mismatch }}" != "warn" ]]; then
          repro+=(--host-mismatch "${{ inputs.host_mismatch }}")
        fi

        if [[ "${{ inputs.mode }}" != "standard" ]]; then
          repro+=(--mode "${{ inputs.mode }}")
        fi

        if [[ "${{ inputs.fail_on_warn }}" == "true" ]]; then
          repro+=(--fail-on-warn)
        fi

        if [[ "${{ inputs.require_baseline }}" == "true" ]]; then
          repro+=(--require-baseline)
        fi

        if [[ -n "${{ inputs.md_template }}" ]]; then
          repro+=(--md-template "${{ inputs.md_template }}")
        fi

        format_command() {
          local formatted=""
          local quoted=""
          local arg

          for arg in "$@"; do
            if [[ -n "${formatted}" ]]; then
              formatted+=" "
            fi
            printf -v quoted "%q" "${arg}"
            formatted+="${quoted}"
          done

          printf "%s" "${formatted}"
        }

        print_artifacts() {
          if [[ ! -d "${out}" ]]; then
            echo "  ${out}/ (directory not found)"
            return
          fi

          local listing
          listing="$(mktemp)"
          find "${out}" -type f \( -name run.json -o -name compare.json -o -name report.json -o -name probe-compare.json -o -name scenario.json -o -name tradeoff.json -o -name decision.md -o -name decision.index.json -o -name comment.md -o -name 'perfgate.*.json' -o -name 'sensor.report.v1.json' \) | sort > "${listing}"

          local count
          count="$(wc -l < "${listing}" | tr -d ' ')"
          if [[ "${count}" == "0" ]]; then
            echo "  ${out}/ (no perfgate receipt files found)"
          else
            head -20 "${listing}" | sed 's/^/  /'
            if [[ "${count}" -gt 20 ]]; then
              echo "  ... ${count} perfgate receipt files total"
            fi
          fi

          rm -f "${listing}"
        }

        has_no_baseline_reason() {
          if [[ ! -d "${out}" ]]; then
            return 1
          fi

          grep -R -q -e "no_baseline" -e "missing baseline" -e "baseline.*missing" "${out}" 2>/dev/null
        }

        repro_line="$(format_command "${repro[@]}")"
        decision_repro=()
        decision_repro_line=""
        if [[ "${{ inputs.decision }}" == "true" ]]; then
          decision_repro=(perfgate decision evaluate --config "${{ inputs.config }}")
          if [[ -n "${{ inputs.out_dir }}" ]]; then
            decision_repro+=(--out-dir "${{ inputs.out_dir }}")
          fi
        fi

        echo "perfgate ${exit_source} exited with code ${exit_code}"
        if [[ -n "${verdict}" ]]; then
          echo "Verdict: ${verdict} (pass=${pass_count:-0}, warn=${warn_count:-0}, fail=${fail_count:-0}, benches=${bench_count:-unknown})"
        fi
        if [[ "${{ inputs.decision }}" == "true" && "${review_required}" == "true" ]]; then
          echo "Review required: ${review_reason}"
        fi
        echo
        echo "Reproduce locally:"
        echo "  ${repro_line}"
        if [[ "${{ inputs.decision }}" == "true" ]]; then
          decision_repro_line="$(format_command "${decision_repro[@]}")"
          echo "  ${decision_repro_line}"
        fi
        echo
        echo "Artifacts:"
        print_artifacts
        if [[ "${{ inputs.all }}" == "true" ]]; then
          echo
          echo "For --all, inspect per-benchmark artifacts under ${out}/<bench>/."
        fi
        if [[ "${{ inputs.mode }}" == "cockpit" ]]; then
          echo
          echo "For cockpit mode, inspect aggregate output plus versioned receipts under ${out}/extras/."
        fi
        if has_no_baseline_reason; then
          echo
          echo "Baseline bootstrap: after reviewing the first trusted run, promote it locally:"
          echo "  perfgate baseline promote --config ${{ inputs.config }} --all"
        fi
        if [[ "${{ inputs.upload_artifact }}" == "true" ]]; then
          echo
          echo "Uploaded artifact: ${artifact_name}"
        fi

        if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
          {
            echo "### perfgate local reproduction"
            echo
            echo "perfgate ${exit_source} exited with code \`${exit_code}\`."
            if [[ -n "${verdict}" ]]; then
              echo
              echo "Verdict: \`${verdict}\` (pass=${pass_count:-0}, warn=${warn_count:-0}, fail=${fail_count:-0}, benches=${bench_count:-unknown})."
            fi
            if [[ "${{ inputs.decision }}" == "true" && "${review_required}" == "true" ]]; then
              echo
              echo "Review required: ${review_reason}"
            fi
            echo
            printf '%s\n' '```bash'
            echo "${repro_line}"
            if [[ "${{ inputs.decision }}" == "true" ]]; then
              echo "${decision_repro_line}"
            fi
            printf '%s\n' '```'
            echo
            echo "Artifacts:"
            echo
            printf '%s\n' '```text'
            print_artifacts
            printf '%s\n' '```'
            if [[ "${{ inputs.all }}" == "true" ]]; then
              echo
              echo "For \`--all\`, inspect per-benchmark artifacts under \`${out}/<bench>/\`."
            fi
            if [[ "${{ inputs.mode }}" == "cockpit" ]]; then
              echo
              echo "For cockpit mode, inspect aggregate output plus versioned receipts under \`${out}/extras/\`."
            fi
            if has_no_baseline_reason; then
              echo
              echo "Baseline bootstrap: after reviewing the first trusted run, promote it locally:"
              echo
              printf '%s\n' '```bash'
              echo "perfgate baseline promote --config ${{ inputs.config }} --all"
              printf '%s\n' '```'
            fi
            if [[ "${{ inputs.upload_artifact }}" == "true" ]]; then
              echo
              echo "Uploaded artifact: \`${artifact_name}\`."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
        fi

    - name: Post PR comment
      if: always() && inputs.comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token || github.token }}
      run: |
        set -euo pipefail

        # Find a tradeoff, compare, or report receipt to comment on.
        # In standard mode, report.json is a perfgate.report.v1.
        # In cockpit mode, report.json is a sensor.report.v1 (not
        # parseable as --report), so we look for extras/ receipts first.
        out="${{ steps.resolve_out_dir.outputs.out_dir }}"
        pr_num="${{ github.event.pull_request.number }}"
        posted=false

        # 1. Tradeoff decision receipts, when workflows produced them explicitly.
        if [[ "${posted}" == "false" && -f "${out}/tradeoff.json" ]]; then
          perfgate comment --tradeoff "${out}/tradeoff.json" --pr "${pr_num}" || true
          posted=true
        fi
        if [[ "${posted}" == "false" && -f "${out}/perfgate.tradeoff.v1.json" ]]; then
          perfgate comment --tradeoff "${out}/perfgate.tradeoff.v1.json" --pr "${pr_num}" || true
          posted=true
        fi
        if [[ "${posted}" == "false" && -f "${out}/extras/perfgate.tradeoff.v1.json" ]]; then
          perfgate comment --tradeoff "${out}/extras/perfgate.tradeoff.v1.json" --pr "${pr_num}" || true
          posted=true
        fi

        # 2. Cockpit single-bench extras
        if [[ "${posted}" == "false" && -f "${out}/extras/perfgate.report.v1.json" ]]; then
          perfgate comment --report "${out}/extras/perfgate.report.v1.json" --pr "${pr_num}" || true
          posted=true
        fi

        # 3. Standard mode report.json (perfgate.report.v1)
        if [[ "${posted}" == "false" && -f "${out}/report.json" && "${{ inputs.mode }}" != "cockpit" ]]; then
          perfgate comment --report "${out}/report.json" --pr "${pr_num}" || true
          posted=true
        fi

        # 4. Standard mode compare.json
        if [[ "${posted}" == "false" && -f "${out}/compare.json" ]]; then
          perfgate comment --compare "${out}/compare.json" --pr "${pr_num}" || true
          posted=true
        fi

        if [[ "${posted}" == "false" ]]; then
          echo "No tradeoff, compare, or report receipt found; skipping PR comment." >&2
        fi

    - name: Upload perfgate artifacts
      if: always() && inputs.upload_artifact == 'true'
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.artifact_name }}-${{ github.run_id }}-${{ github.run_attempt }}
        path: ${{ steps.resolve_out_dir.outputs.out_dir }}
        if-no-files-found: warn
