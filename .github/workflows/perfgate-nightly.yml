name: perfgate-nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  nightly:
    name: Nightly Calibration Lane
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Build release binaries
        run: |
          cargo build --release -p perfgate-cli --bin perfgate
          cargo build --release -p perfgate-selfbench
          ./target/release/perfgate --version
          ./target/release/perfgate-selfbench noop


      - name: Run calibration
        run: ./target/release/perfgate check --config .ci/perfgate-nightly.toml --all --mode cockpit --output-github

      - name: Refresh candidate baselines
        run: cargo run -p xtask -- dogfood promote

      - name: Export trends
        run: cargo run -p xtask -- dogfood export-trends

      - name: Generate weekly variance summary
        run: |
          cargo run -p xtask -- dogfood summarize --dir artifacts/trends > artifacts/trends/variance-summary.md
          cat artifacts/trends/variance-summary.md >> $GITHUB_STEP_SUMMARY

      - name: Create or update baseline PR
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH_NAME="bot/perfgate-baselines"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout -b "$BRANCH_NAME" || git checkout "$BRANCH_NAME"
          
          # Move trends into the repo for persistence
          mkdir -p baselines/trends
          cp -r artifacts/trends/* baselines/trends/
          
          git add baselines/gha-ubuntu-24.04-x86_64/ baselines/trends/
          
          if git diff --staged --quiet; then
            echo "No baseline or trend changes detected."
            exit 0
          fi
          
          git commit -m "perf: refresh nightly baselines and persist trends"
          git push origin "$BRANCH_NAME" --force
          
          gh pr create \
            --title "perf: refresh nightly baselines and trends" \
            --body "Automatic nightly baseline calibration and trend persistence for gha-ubuntu-24.04-x86_64. 
            
            This PR updates the canonical performance baselines and saves the latest trend data (JSONL/Prometheus/Summary) to \`baselines/trends/\` for long-term historical analysis." \
            --base main \
            --head "$BRANCH_NAME" || echo "PR already exists"
          
          gh pr merge "$BRANCH_NAME" --auto --merge || echo "Already merged or merge failed"

      - name: Upload nightly artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: perfgate-artifacts-nightly-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/perfgate
            artifacts/trends
          if-no-files-found: warn
