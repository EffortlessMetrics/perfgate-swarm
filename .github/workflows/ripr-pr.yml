name: RIPR PR Evidence

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ripr-pr-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  ripr:
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on:
      group: em-ci-small
      labels:
        - self-hosted
        - linux
        - x64
        - em-ci
        - cx43
        - rust-medium
        - trusted-pr
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install ripr
        run: cargo install ripr --locked

      - name: Fetch base branch
        if: github.base_ref != ''
        run: git fetch origin ${{ github.base_ref }}

      - name: RIPR PR evidence
        run: cargo xtask ripr-pr

      - name: RIPR review guidance
        run: cargo xtask ripr-review-comments

      - name: RIPR PR contract
        if: always()
        run: cargo xtask ripr-pr --check

      - name: RIPR review summary
        if: always()
        shell: bash
        run: |
          {
            echo "## RIPR Review Guidance"
            echo
            if [ -f target/ripr/review/comments.md ]; then
              cat target/ripr/review/comments.md
            else
              echo "No RIPR review guidance was produced."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: RIPR annotations
        if: always()
        run: python scripts/ripr-annotations.py

      - name: Upload RIPR PR evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ripr-pr
          path: target/ripr/pr
          if-no-files-found: warn

      - name: Upload RIPR review guidance
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ripr-review
          path: target/ripr/review
          if-no-files-found: warn
