name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (for example v0.15.1)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    if: github.repository == 'EffortlessMetrics/perfgate'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: self-hosted
            cross: true
            smoke: true
          - target: x86_64-unknown-linux-musl
            runner: self-hosted
            cross: true
            smoke: true
          - target: aarch64-unknown-linux-gnu
            runner: self-hosted
            cross: true
            smoke: false
          - target: x86_64-apple-darwin
            runner: self-hosted
            cross: false
            smoke: true
          - target: aarch64-apple-darwin
            runner: self-hosted
            cross: false
            smoke: true
          - target: x86_64-pc-windows-msvc
            runner: self-hosted
            cross: false
            smoke: true

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Generate lockfile when not checked in
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }} -p perfgate-cli
          else
            cargo build --release --locked --target ${{ matrix.target }} -p perfgate-cli
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../perfgate-${{ matrix.target }}.tar.gz perfgate
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../perfgate-${{ matrix.target }}.zip perfgate.exe
          cd ../../..

      - name: Smoke packaged archive
        shell: bash
        run: |
          set -euo pipefail
          smoke_dir="packaged-smoke-${{ matrix.target }}"
          rm -rf "$smoke_dir"
          mkdir -p "$smoke_dir"

          if [ "${{ runner.os }}" = "Windows" ]; then
            7z x -y "perfgate-${{ matrix.target }}.zip" "-o$smoke_dir"
            binary="$smoke_dir/perfgate.exe"
          else
            tar xzf "perfgate-${{ matrix.target }}.tar.gz" -C "$smoke_dir"
            binary="$smoke_dir/perfgate"
          fi

          test -f "$binary"
          if [ "${{ matrix.smoke }}" = "true" ]; then
            "$binary" --version
            "$binary" doctor --help
          else
            echo "Skipping execution smoke for non-native target ${{ matrix.target }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: perfgate-${{ matrix.target }}
          path: perfgate-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    name: create release
    needs: build
    if: github.repository == 'EffortlessMetrics/perfgate'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: perfgate-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          sha256sum perfgate-*.tar.gz perfgate-*.zip > sha256sums.txt
          cat sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            artifacts/perfgate-*.tar.gz
            artifacts/perfgate-*.zip
            artifacts/sha256sums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
