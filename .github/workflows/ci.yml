name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [ main ]

jobs:
  deny:
    name: cargo-deny
    if: >-
      github.repository == 'EffortlessMetrics/perfgate' &&
      (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci'))
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  test:
    name: test (${{ matrix.os }})
    if: >-
      github.repository == 'EffortlessMetrics/perfgate' &&
      (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci'))
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [self-hosted]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run CI Suite (xtask)
        run: cargo run -p xtask -- ci

  server-integration:
    name: server integration (memory/sqlite/postgres)
    if: >-
      github.repository == 'EffortlessMetrics/perfgate' &&
      (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci'))
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: perfgate
          POSTGRES_USER: perfgate
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U perfgate -d perfgate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run live baseline server CLI workflows
        env:
          PERFGATE_TEST_POSTGRES_URL: postgres://perfgate@localhost:5432/perfgate
        run: cargo test -p perfgate-cli --test cli_server_tests live_server -- --nocapture
