name: Badge Endpoints

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: badge-endpoints-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    runs-on:
      group: em-ci-small
      labels:
        - self-hosted
        - linux
        - x64
        - em-ci
        - cx43
        - rust-medium
        - trusted-pr
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install ripr
        run: |
          cargo install ripr --version 0.5.0 --locked --force
          ripr --version

      - name: Refresh badge endpoints
        run: cargo xtask badges

      - name: Open badge refresh PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/badge-endpoints
          delete-branch: true
          title: "badge: refresh public endpoints"
          commit-message: "badge: refresh public endpoints"
          body: |
            Refreshes generated Shields endpoint JSON under `badges/`.

            Generated by:

            ```bash
            cargo xtask badges
            ```
