# perfgate GitLab CI Template
#
# This template provides a standard job for running perfgate performance checks
# in GitLab CI/CD pipelines.
#
# Usage:
#   include:
#     - remote: 'https://raw.githubusercontent.com/EffortlessMetrics/perfgate/v0.15.0/gitlab-ci/perfgate.yml'
#
#   perfgate-check:
#     extends: .perfgate-check
#     variables:
#       PERFGATE_CONFIG: "perfgate.toml"

.perfgate-check:
  image: rust:latest
  stage: test
  variables:
    PERFGATE_CONFIG: "perfgate.toml"
    PERFGATE_ARTIFACTS_DIR: "artifacts/perfgate"
  before_script:
    - |
      if ! command -v perfgate &> /dev/null; then
        echo "Installing perfgate..."
        cargo install perfgate-cli 2>/dev/null || cargo install perfgate
      fi
  script:
    - mkdir -p ${PERFGATE_ARTIFACTS_DIR}
    - perfgate check --config ${PERFGATE_CONFIG} --all
  artifacts:
    when: always
    paths:
      - ${PERFGATE_ARTIFACTS_DIR}/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
