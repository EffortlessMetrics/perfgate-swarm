schema_version = "1.0"

id = "first-useful-performance-review"
name = "First useful performance review"
status = "active"
owner = "product-platform"

objective = """
Make perfgate produce one coherent, reviewable first-use performance answer from
native or imported evidence, while preserving advisory boundaries and human
review for policy changes.
"""

end_state = [
  "perfgate can recommend reviewable adoption packs from repository shape.",
  "adoption apply can emit non-mutating setup patches and local commands.",
  "review explain composes evidence source, baseline health, signal maturity, policy posture, non-inferences, and next commands.",
  "review packets and Action summaries include a benchmark passport.",
  "repair context includes agent-safe commands, forbidden changes, and human-review requirements.",
  "baseline and policy promotion plans are non-mutating and reviewable.",
  "product claims cite proof without overstating canary or release status.",
]

