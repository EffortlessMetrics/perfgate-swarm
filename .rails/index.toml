schema_version = "1.0"

[project]
repo = "perfgate"
framework = "rails"
root = ".rails"

[conventions]
proposal_prefix = "PERFGATE-PROP"
spec_prefix = "PERFGATE-SPEC"
adr_prefix = "PERFGATE-ADR"
lane_prefix = "PERFGATE-LANE"

[external_namespaces]
codex = ".codex"
speckit = ".spec"
claude = ".claude"
jules = ".jules"

[[artifact]]
id = "PERFGATE-PROP-0001"
kind = "proposal"
path = ".rails/proposals/PERFGATE-PROP-0001-rails-knowledge-base.md"
status = "accepted"
owner = "rails-adoption"

[[artifact]]
id = "PERFGATE-PROP-0002"
kind = "proposal"
path = ".rails/proposals/PERFGATE-PROP-0002-first-useful-performance-review.md"
status = "accepted"
owner = "product-platform"

[[artifact]]
id = "PERFGATE-SPEC-0001"
kind = "spec"
path = ".rails/specs/PERFGATE-SPEC-0001-rails-artifact-graph.md"
status = "accepted"
owner = "rails-adoption"
linked_proposal = "PERFGATE-PROP-0001"

[[artifact]]
id = "PERFGATE-SPEC-0002"
kind = "spec"
path = ".rails/specs/PERFGATE-SPEC-0002-first-useful-performance-review.md"
status = "accepted"
owner = "product-platform"
linked_proposal = "PERFGATE-PROP-0002"

[[artifact]]
id = "PERFGATE-ADR-0001"
kind = "adr"
path = ".rails/adr/PERFGATE-ADR-0001-rails-framework-footprint.md"
status = "accepted"
owner = "rails-adoption"
linked_specs = ["PERFGATE-SPEC-0001"]

[[lane]]
id = "rails-adoption"
name = "Rails adoption"
path = ".rails/lanes/rails-adoption/tracker.toml"
status = "active"
owner = "docs-platform"

[[lane]]
id = "first-useful-performance-review"
name = "First useful performance review"
path = ".rails/lanes/first-useful-performance-review/tracker.toml"
status = "active"
owner = "product-platform"
