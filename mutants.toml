# Mutation Testing Configuration for perfgate
# Run with: cargo run -p xtask -- mutants
# Or directly: cargo mutants
#
# Expected Kill Rates by Crate Category:
# ┌─────────────────────────────────────────────────────────┬──────────────────┐
# │ Crate Category                                          │ Target Kill Rate │
# ├─────────────────────────────────────────────────────────┼──────────────────┤
# │ Core Domain (domain, types, budget, stats)              │ 95-100%          │
# │ Application (app, client, server)                       │ 90%              │
# │ Adapters & Infrastructure (adapters, host-detect, paired)│ 80-85%          │
# │ Presentation (export, render, sensor)                   │ 80%              │
# │ CLI (cli)                                               │ 70%              │
# └─────────────────────────────────────────────────────────┴──────────────────┘

# Exclude test code and generated code from mutation
exclude_globs = [
    "**/tests/**",
    "**/proptest-regressions/**",
    "**/benches/**",
    "fuzz/**",
    "xtask/**",
]

# Focus on high-value targets - core business logic crates
# These crates contain the most critical logic that should be thoroughly tested
include_globs = [
    "crates/perfgate-domain/src/**",
    "crates/perfgate-types/src/**",
    "crates/perfgate-budget/src/**",
    "crates/perfgate-app/src/**",
    "crates/perfgate-cli/src/**",
    "crates/perfgate-adapters/src/**",
    "crates/perfgate-server/src/**",
    "crates/perfgate-client/src/**",
    "crates/perfgate-export/src/**",
    "crates/perfgate-render/src/**",
    "crates/perfgate-sensor/src/**",
    "crates/perfgate-host-detect/src/**",
    "crates/perfgate-paired/src/**",
    "crates/perfgate-error/src/**",
    "crates/perfgate-sha256/src/**",
    "crates/perfgate-fake/src/**"
]

# Timeout per mutant in seconds
# Set to 60s to allow for property-based tests which may take longer
timeout = 60

# Minimum test timeout - ensures fast tests don't timeout prematurely
minimum_test_timeout = 20
