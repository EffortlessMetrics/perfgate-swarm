current_pr = "policy-ergonomics-closeout"

objective = """
Make perfgate safe for teams to promote mature performance evidence into
policy. A team should be able to start advisory, prove baseline and signal
maturity, review a promotion recommendation, emit a non-mutating policy patch,
surface advisory versus blocking posture in review and CI, keep agents from
weakening gates, and cite only fresh enough proof.
"""

