  "Policy profile metadata exists for common repo shapes without behavior-changing magic.",
  "Promotion readiness can be reported without mutating config.",
  "Policy patch output is reviewable and non-mutating.",
  "Review packets gather verdict, posture, maturity, signal, calibration, decision, proof freshness, next command, and do-not guidance.",
  "GitHub Action summaries distinguish advisory signals, blocking gates, maturity warnings, promotion candidates, and policy review requirements.",
  "Agent policy guardrails define allowed, review-required, and forbidden policy changes.",
  "Agent policy fixtures cover missing baseline, noisy signal, mature promotion candidate, regression, tradeoff candidate, and stale proof.",
