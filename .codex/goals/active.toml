current_pr = "docs(status): add canary freshness matrix"

objective = """
Make perfgate useful after week one. A team should be able to tell which
benchmarks are smoke checks, advisory, gate-ready, or paired-mode candidates;
which baselines are immature, stale, host-mismatched, or noisy; which results
are too noisy to trust; when structured decisions are warranted; what reviewers
should run locally; what agents should fix first; and when optional ledger
history is worth recording.
"""

end_state = [
  "Benchmark recipes include reviewable maturity metadata.",
  "Baseline doctor classifies missing, new, immature, mature, stale, host-mismatched, and high-noise baselines.",
  "Signal doctor reports sample count, noise, host stability, baseline age, drift, and gate/advisory/paired recommendations.",
  "Calibration can emit reviewable non-mutating config patches.",
  "Decision examples and decision-suggestion reasons make tradeoff patterns recognizable.",
  "Canary freshness is tracked without overstating old proof.",
  "Optional server ledger operations have backup/restore or equivalent operational proof.",
  "Agent repair context has a contract and fixtures for common repair scenarios.",
  "Product claims use proof freshness tiers for implemented behavior.",
  "The lane closes with a handoff and archived active goal.",
]

