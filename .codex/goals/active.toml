milestone = "0.18.0"
current_work_item = "first-hour-smoke-proof"
current_pr = "test: add first-hour adoption smoke fixture"

objective = """
Make perfgate easy for cold users to install, initialize, run locally,
wire into CI, understand failures, adopt structured decisions, add probes,
and optionally operate a decision ledger.
"""

end_state = [
  "A new user can install, initialize, run a local gate, promote a baseline, and wire CI without learning the full architecture.",
  "CI failures explain what happened, where artifacts are, and how to reproduce locally.",
  "Structured decisions are teachable through concrete outcome examples.",
  "Probe instrumentation is documented as a tradeoff lens, not profiling.",
  "Probe evidence can be proven from ingest through decision evaluate and decision bundle.",
  "Team ledger mode has an operator runbook while remaining optional for local correctness.",
  "Guided adoption product claims link to specs, docs, tests, proof commands, and artifacts.",
  "The lane closes with a handoff and archived active-goal manifest.",
]

