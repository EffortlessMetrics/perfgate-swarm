id = "perfgate-first-useful-performance-review"
title = "perfgate 0.22 first useful performance review"
status = "active"
owner = "codex"
created = "2026-05-21"
milestone = "0.22.0"
current_work_item = "adoption-apply-dry-run"
current_pr = "adoption-apply-dry-run"

objective = """
Turn perfgate's evidence-intake and maturity substrate into one coherent
first-use performance review loop: recommend a reviewable setup, emit dry-run
setup patches, explain evidence posture, surface benchmark passports, guide
agents safely, and produce non-mutating baseline and policy promotion plans.
"""

end_state = [
  "Adoption pack recommendation is implemented and fixture-backed.",
  "Adoption apply emits non-mutating dry-run setup artifacts.",
  "Review explain composes evidence source, baseline health, signal maturity, policy posture, non-inferences, and next commands.",
  "Benchmark passport appears in review packets and Action summaries.",
  "Repair context includes safe commands, forbidden changes, and human-review requirements.",
  "Baseline and policy promote-plan commands are non-mutating and reviewable.",
  "Canaries, docs, and product claims describe implemented behavior without overclaiming.",
]

